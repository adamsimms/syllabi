<ul class="course-sidebar-hub">
  <li><a href="https://syllabi.adamsimms.xyz/">← All courses</a></li>
</ul>

<h2 class="book-brand">
  <a class="book-brand-link" href="{{ partial "docs/links/home" . }}">
    {{- with .Site.Params.BookLogo -}}
    <img src="{{ . | relURL }}" alt="{{ partial "docs/text/i18n" "Logo" }}" />
    {{- end -}}
    <span class="book-brand-text">
      <small class="book-brand-code">{{ .Site.Params.courseCode }}</small>
      <span class="book-brand-title">{{ .Site.Params.courseTitle | safeHTML }}</span>
      {{- with .Site.Params.courseTerms -}}
      <span class="book-brand-terms">
        {{- range . -}}
        <span class="book-brand-term">{{ . }}</span>
        {{- end -}}
      </span>
      {{- end -}}
    </span>
  </a>
</h2>
