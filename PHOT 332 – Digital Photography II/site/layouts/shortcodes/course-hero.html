<figure class="course-hero">
  <img
    src="{{ (.Site.Params.socialImage | default "images/conelrad-v09.jpg") | relURL }}"
    alt="{{ .Site.Params.hero.alt }}"
    width="2048"
    height="1152"
    loading="eager"
    decoding="async"
  >
  <figcaption>
    <em><strong><a href="{{ .Site.Params.hero.creditUrl }}" target="_blank" rel="noopener">{{ .Site.Params.hero.caption }}</a></strong></em>
  </figcaption>
</figure>
