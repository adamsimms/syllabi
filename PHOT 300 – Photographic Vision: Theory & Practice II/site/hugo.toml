baseURL = "https://syllabi.adamsimms.xyz/phot300/"
title = "Photographic Vision: Theory & Practice II"
theme = "hugo-book"

copyright = "[Adam Simms](https://www.concordia.ca/faculty/adam-simms.html) · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)"

disablePathToLower = true
disableKinds = ["taxonomy", "term"]
publishDir = "_site"

[outputs]
  home = ["HTML", "TXT"]
  page = ["HTML", "TXT"]
  section = ["HTML", "TXT"]

[outputFormats.TXT]
  mediaType = "text/plain"
  baseName = "index"
  isPlainText = true

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    style = "github"

[params]
  BookTheme = "light"
  BookToC = false
  BookSearch = false
  BookComments = false
  BookSection = "/"
  BookRepo = "https://github.com/adamsimms/syllabi"
  BookFavicon = "favicon.svg"
  courseCode = "PHOT 300"
  courseTitle = "Photographic Vision: Theory & Practice II"
  appointmentsUrl = "https://cal.com/adam-simms-ivi9mt/1-hour-meeting"
  socialImage = "images/camera-obscura.jpg"
  socialImageOg = "images/og-square.jpg"
  socialImageWidth = 1200
  socialImageHeight = 1200
  siteDescription = "PHOT 300 Photographic Vision: Theory & Practice II — intermediate studio syllabus and materials taught by Adam Simms at Concordia University."

[params.hero]
  alt = "1646 Athanasius Kircher illustration of a portable camera obscura from Ars Magna Lucis et Umbrae"
  caption = "Athanasius Kircher — Camera obscura (1646)"
  creditUrl = "https://commons.wikimedia.org/wiki/File:1646_Athanasius_Kircher_-_Camera_obscura.jpg"
